# arXiv Paper Tracker Configuration

# ============================================================
# 重要提示：开源前请修改以下配置
# IMPORTANT: Please modify the following before open-sourcing
# ============================================================

# arXiv 配置
arxiv:
  categories:
    - "cs.SD"      # Audio and Speech Processing
    - "eess.AS"    # Audio and Speech Processing
    - "cs.CL"      # Computation and Language (需要额外过滤)
  keywords_filter:  # 用于 cs.CL 的过滤
    - "speech"
    - "audio"
    - "TTS"
    - "ASR"
    - "voice"
    - "acoustic"
    - "speaker"
  max_results: 200  # 每次最多获取论文数（增大以覆盖更多天数）
  days_back: 7      # 获取最近几天的论文（增大以防遗漏）

# LLM 配置
llm:
  # 优先级顺序：按列表顺序尝试，第一个成功的会被使用
  providers:
    - name: "anthropic"
      model: "claude-opus-4-6"
      enabled: true
    - name: "groq"
      model: "llama-3.3-70b-versatile"
      enabled: true
  max_tokens: 800
  temperature: 0.3

# 数据库清理配置
database:
  type: "sqlite"
  path: "../data/papers.db"
  # 保留最近多少天的论文（超过的会被清理）
  retention_days: 90

# 研究兴趣配置（用于相关性评分）
research_interests:
  # 按重要性排序，权重递减
  primary:
    - "text-to-speech"
    - "TTS"
    - "speech synthesis"
    - "voice cloning"
    - "neural vocoder"
  secondary:
    - "ASR"
    - "speech recognition"
    - "voice conversion"
    - "singing voice synthesis"
  tertiary:
    - "speech enhancement"
    - "speaker verification"
    - "emotion recognition"

# 子领域分类
subcategories:
  - "TTS (语音合成)"
  - "ASR (语音识别)"
  - "语音增强"
  - "说话人识别/验证"
  - "语音转换"
  - "歌声合成"
  - "语音情感识别"
  - "多模态语音"
  - "其他"

# 每周精选配置
featured:
  enabled: true
  count: 5  # 每周精选数量
  # 精选方向（子领域）
  target_subcategories:
    - "TTS (语音合成)"
    - "多模态语音"
    - "歌声合成"
    - "语音转换"
  # 精选关键词（论文包含这些关键词会加分）
  keywords:
    - "text-to-speech"
    - "TTS"
    - "speech synthesis"
    - "multimodal"
    - "voice cloning"
    - "zero-shot"
    - "neural codec"
    - "diffusion"
    - "language model"
  # 精选评分阈值（innovation_score 或 relevance_score >= 此值才能入选）
  min_score: 6.0

# 数据库配置
database:
  type: "sqlite"
  path: "../data/papers.db"

# 调度器配置
scheduler:
  enabled: true
  fetch_time: "15:00"  # 每天执行时间 (HH:MM)
  timezone: "Asia/Shanghai"

# 订阅推送配置
notification:
  enabled: true
  # 推送时间（在论文抓取后执行）
  push_time: "15:30"

  # 订阅关键词（匹配标题或摘要）
  keywords:
    - "text-to-speech"
    - "TTS"
    - "speech synthesis"
    - "voice cloning"
    - "zero-shot"
    - "neural codec"
    - "diffusion"

  # 机构订阅（来自这些机构的论文会推送）
  institutions:
    - "Google"
    - "OpenAI"
    - "ByteDance"
    - "Tsinghua"
    - "清华"

  # 最低评分阈值（只推送高于此分数的论文）
  min_score: 7.0

  # 每次最多推送论文数
  max_papers: 10

  # 飞书机器人配置
  feishu:
    enabled: true
    # Webhook URL 从环境变量 FEISHU_WEBHOOK_URL 读取
    webhook_url: ""

  # 微信推送配置（支持 Server酱、PushPlus、企业微信）
  wechat:
    enabled: false
    # 推送渠道: "serverchan" | "pushplus" | "wecom"
    channel: "pushplus"
    # Token 从环境变量 WECHAT_PUSH_TOKEN 读取
    token: ""

# Web 服务配置
web:
  host: "0.0.0.0"
  port: 8000
  # 前端地址（用于 CORS 和推送消息中的链接）
  frontend_url: "http://localhost:5173"
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

